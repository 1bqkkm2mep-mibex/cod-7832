<script>
  let tiempo = 15;
  let intervalo;

  function iniciarContador() {
    intervalo = setInterval(() => {
      tiempo--;
      document.getElementById('contador').textContent = `Podemos enviar un nuevo código en 00:${tiempo.toString().padStart(2, '0')}`;
      if (tiempo === 0) {
        clearInterval(intervalo);
        restablecerElementos();
      }
    }, 1000);
  }

  function ocultarTexto() {
    document.querySelector('.spn4').style.display = 'none';
    document.querySelector('.spn5').style.display = 'none';
    document.querySelector('.spn6').style.display = 'none';
    document.querySelector('.svg-icon').style.display = 'none';
    document.getElementById('contador').style.display = 'block';
    iniciarContador();
  }

  function restablecerElementos() {
    document.querySelector('.spn4').style.display = 'block';
    document.querySelector('.spn5').style.display = 'block';
    document.querySelector('.spn6').style.display = 'block';
    document.querySelector('.svg-icon').style.display = 'block';
    document.getElementById('contador').style.display = 'none';
    tiempo = 15;
  }

  ocultarTexto();
</script>
